<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <linearGradient id="grd" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gradient border -->
  <rect x="1" y="1" width="62" height="62" rx="13.5" fill="none" stroke="url(#grd)" stroke-width="1.5" opacity="0.7"/>
  <!-- Code brackets styled "AS" -->
  <!-- Left bracket -->
  <path d="M14 22 L8 32 L14 42" stroke="url(#grd)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" opacity="0.9"/>
  <!-- Right bracket -->
  <path d="M50 22 L56 32 L50 42" stroke="url(#grd)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" opacity="0.9"/>
  <!-- "AS" text centered -->
  <text
    x="32"
    y="37"
    font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-size="19"
    font-weight="800"
    fill="url(#grd)"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="-0.5"
  >AS</text>
</svg>
