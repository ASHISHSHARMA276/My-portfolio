[build]
  base = "artifacts/portfolio"
  command = "npm install -g pnpm && pnpm install --frozen-lockfile=false && pnpm run build"
  publish = "dist/public"

[build.environment]
  NODE_ENV = "production"
  BASE_PATH = "/"
  CI = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
